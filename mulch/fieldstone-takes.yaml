# Fieldstone variations — second pass.
# Fixes from first attempt: explicitly preserve the curved stacked-stone paver
# edging that borders the bed, and explicitly preserve every wooden deck step
# (the previous fieldstone-moss replaced part of the bottom step with stone).

source: ref-1.jpeg
model: pro

variations:
  - name: fieldstone-moss-bed
    prompt: >-
      Replace ONLY the wood-chip mulch inside the planting bed with fitted
      irregular fieldstone flagstones — flat, weathered, cool-grey natural
      stone slabs of varying sizes laid tight together to fill the entire
      interior of the bed as a continuous ground covering, with vivid green
      moss filling the narrow seams between the stones. The new stone must
      fill the bed interior only, all the way from the existing paver edging
      up to the base of the deck stairs.
      Preserve the rest of the scene exactly and unchanged: the cable-rail
      deck with its light-grey composite decking AND every wooden deck step
      including the lowest step at ground level (do NOT replace any portion
      of any deck step with stone — the steps remain wood); the black
      chain-link fence; the yellow steel raised planters; the multi-trunk
      shrub on the left; the daylilies and ornamental grasses; and crucially
      the existing curved stacked-stone paver edging on the left side of the
      bed (the small grey concrete-block retaining edging that curves around
      the daylilies — leave it fully intact and visible, do not replace it
      with flagstone). Match the existing daylight, perspective, and
      shadows. Photorealistic.

